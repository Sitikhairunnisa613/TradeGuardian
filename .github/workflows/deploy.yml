name: Deploy TradeGuardian

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  laravel-tests:
    name: Build & Test (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, sqlite, pdo_sqlite
        coverage: none

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Copy Environment File
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate Application Key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create SQLite Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Install NPM Dependencies & Build Assets
      run: |
        npm ci
        npm run build

    - name: Execute Tests (Pest)
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test

  deploy:
    name: Deploy to Server (CD)
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy Files via SSH/Rsync
      uses: easingthemes/ssh-deploy@v5.1.0
      with:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY || secrets.SSH_PRIVATE_KEY }}
        ARGS: "-rlgoDzvO --delete"
        SOURCE: "./"
        REMOTE_HOST: ${{ secrets.SSH_HOST }}
        REMOTE_USER: ${{ secrets.SSH_USERNAME }}
        REMOTE_PORT: ${{ secrets.SSH_PORT || '22' }}
        TARGET: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
        EXCLUDE: "/node_modules/, /vendor/, /tests/, /.git/, /.github/"

    - name: Run Post-Deployment Optimizations
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY || secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || '22' }}
        script: |
          cd ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
          # Install dependencies without dev-packages
          composer install --no-dev --optimize-autoloader --no-interaction --no-ansi
          # Run database migrations
          php artisan migrate --force
          # Cache config, routes, and views
          php artisan config:cache
          # Route caching
          php artisan route:cache
          php artisan view:cache
          # Restart queue workers if applicable
          php artisan queue:restart
